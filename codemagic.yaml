workflows:
  ios_unsigned:
    name: iOS unsigned IPA
    working_directory: ys-mobile
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS without code signing
        script: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r Runner-unsigned.ipa Payload

    artifacts:
      - build/ios/ipa/Runner-unsigned.ipa
      - ys-mobile/build/ios/ipa/Runner-unsigned.ipa
