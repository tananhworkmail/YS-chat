server:
  port: "3666"
  secret: "change-me"
  # release | debug
  mode: "debug"

cors:
  global: "true"
  ips: "http://localhost:1800"

chat:
  recallWindowSeconds: 900

realtime:
  # memory is suitable for one backend. Use redis when running multiple instances.
  eventBus: "memory"
  redisURL: "redis://127.0.0.1:6379/0"
  redisChannel: "ys-chat:realtime:v1"
  pingIntervalSeconds: 25
  pongWaitSeconds: 60
  writeWaitSeconds: 10
  maxMessageBytes: 65536
  sendQueueSize: 64

webrtc:
  # ICE servers are returned by GET /api/v1/chat/calls/ice-config.
  stunURLs:
    - "stun:stun.l.google.com:19302"
  turnURLs: []
  # Prefer TURN_SHARED_SECRET for short-lived TURN REST credentials. Static
  # TURN_USERNAME/TURN_CREDENTIAL environment variables are a fallback.
  turnCredentialTTLSeconds: 3600
  # The embedded relay removes the need to deploy coturn separately. Set the
  # relay IP to the address clients can reach, and open the listener plus relay
  # port range in the host/container firewall.
  embeddedTURNEnabled: false
  embeddedTURNListenAddress: "0.0.0.0:3478"
  embeddedTURNRelayIP: ""
  embeddedTURNRealm: "ys-chat"
  embeddedTURNMinPort: 49160
  embeddedTURNMaxPort: 49200
  callRingTimeoutSeconds: 45
  callConnectTimeoutSeconds: 60
  callMaximumDurationSeconds: 14400

database:
  # mysql | postgres | sqlite | sqlserver
  driver: "mysql"
  dbname: "ysweb"
  username: "user"
  password: "password"
  host: "127.0.0.1"
  port: "3306"
  sslmode: "false"
  logmode: "true"
