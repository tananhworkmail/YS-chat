upstream ys_chat_backend {
    server 192.168.71.87:3666;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 1800;
    server_name localhost web.tythac.com.vn;
    client_max_body_size 2048m;

    root /usr/share/nginx/html;
    index index.html;

    # Vue Router SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /downloads/YSChat.apk {
        types {}
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment; filename=\"YS Chat.apk\"; filename*=UTF-8''YS%20Chat.apk" always;
        add_header Content-Transfer-Encoding binary always;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control no-store always;
        try_files /downloads/YSChat.apk =404;
    }

    location /downloads/ {
        try_files $uri =404;
    }

    location /api/v1/chat/realtime {
        proxy_pass http://ys_chat_backend/api/v1/chat/realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Proxy tới backend API
    location /api/v1/ {
       proxy_pass http://ys_chat_backend/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://ys_chat_backend/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
