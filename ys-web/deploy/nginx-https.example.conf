server {
    listen 80;
    server_name chat.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.example.com;
    client_max_body_size 2048m;

    ssl_certificate /etc/nginx/certs/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/chat.example.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /downloads/YSChat.apk {
        types {}
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment; filename=\"YS Chat.apk\"; filename*=UTF-8''YS%20Chat.apk" always;
        add_header Content-Transfer-Encoding binary always;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control no-store always;
        try_files /downloads/YSChat.apk =404;
    }

    location /downloads/ {
        try_files $uri =404;
    }

    location /api/v1/chat/realtime {
        proxy_pass http://webmanager-web-api:3666/api/v1/chat/realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/v1/ {
        proxy_pass http://webmanager-web-api:3666/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://webmanager-web-api:3666/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
