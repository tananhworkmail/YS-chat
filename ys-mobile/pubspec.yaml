name: ys_mobile
description: Flutter mobile client for YS Chat using ys-web-api.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^11.0.2
  flutter_secure_storage: ^9.2.2
  http_parser: ^4.0.2
  intl: ^0.19.0
  just_audio: ^0.9.46
  mime: ^2.0.0
  path_provider: ^2.1.5
  provider: ^6.1.2
  record: ^7.1.1
  video_player: ^2.9.2
  flutter_webrtc: ^0.12.12
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logochat.png
